<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="https://github.githubassets.com/favicons/favicon.svg"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700&display=swap"
            rel="stylesheet"
        />
        <title>Sponsor wu-clan</title>
        <style>
            :root {
                --bg-color: #080808;
                --text-primary: #ffffff;
                --text-secondary: #a1a1a1;
                --border-subtle: rgba(255, 255, 255, 0.1);
                --card-bg: #121212;
                --card-border: #282828;
                --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            body {
                background-color: var(--bg-color);
                color: var(--text-primary);
                font-family: "Inter", sans-serif;
                height: 100dvh;
                width: 100vw;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                margin: 0;
                padding: 0 20px;
                overflow: hidden;
                -webkit-font-smoothing: antialiased;
            }

            body::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: radial-gradient(
                    circle at 50% -20%,
                    #1a1a1a 0%,
                    transparent 70%
                );
                z-index: -1;
            }

            @keyframes fadeInUp {
                from {
                    opacity: 0;
                    transform: translateY(12px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .anim-fade-up {
                opacity: 0;
                will-change: transform, opacity;
                animation: fadeInUp 0.5s ease-out forwards;
            }

            .delay-1 {
                animation-delay: 0.1s;
            }

            .delay-2 {
                animation-delay: 0.2s;
            }

            /* --- Header --- */
            .header-section {
                text-align: center;
                margin-bottom: 2.5vh;
            }

            .avatar-wrapper {
                width: 60px;
                height: 60px;
                margin: 0 auto 0.8rem;
                background: linear-gradient(135deg, #222, #0a0a0a);
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1.5rem;
                border: 1px solid var(--border-subtle);
                position: relative;
            }

            .avatar-wrapper::after {
                content: "❤";
                position: absolute;
                bottom: 0;
                right: 0;
                background: #e11d48;
                color: #fff;
                font-size: 0.6rem;
                width: 18px;
                height: 18px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 2px solid var(--bg-color);
            }

            .header-section h1 {
                font-family: "Plus Jakarta Sans", sans-serif;
                font-weight: 700;
                font-size: 1.6rem;
                letter-spacing: -0.03em;
                margin-bottom: 0.2rem;
                background: linear-gradient(to bottom, #fff 60%, #aaa 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .header-section p {
                color: var(--text-secondary);
                font-size: 0.85rem;
            }

            /* --- Sponsor Card --- */
            .content-container {
                width: 100%;
                max-width: 760px;
            }

            .section-label {
                font-size: 0.6rem;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                color: #444;
                margin-bottom: 0.8rem;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .section-label::after {
                content: "";
                height: 1px;
                flex-grow: 1;
                background: rgba(255, 255, 255, 0.05);
            }

            .payment-grid {
                display: grid;
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 14px;
            }

            .payment-card {
                background: var(--card-bg);
                border: 1px solid var(--card-border);
                border-radius: 16px;
                padding: 14px;
                text-align: center;
                transition: var(--transition);
            }

            .payment-card:hover {
                border-color: #555;
                transform: translateY(-1px);
            }

            .payment-title {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                margin-bottom: 12px;
            }

            .sponsor-icon {
                width: 26px;
                height: 26px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.03);
                color: #666;
                font-size: 0.85rem;
                transition: var(--transition);
            }

            .sponsor-name {
                font-weight: 500;
                font-size: 0.8rem;
                color: #d0d0d0;
            }

            /* --- Brand Colors on Hover --- */
            .alipay-card:hover .sponsor-icon {
                color: #1677ff;
                background: rgba(22, 119, 255, 0.15);
            }

            .wechat-card:hover .sponsor-icon {
                color: #07c160;
                background: rgba(7, 193, 96, 0.15);
            }

            /* --- Footer --- */
            .footer-section {
                margin-top: 2vh;
                padding-top: 1rem;
                border-top: 1px solid var(--border-subtle);
                width: 100%;
                max-width: 760px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .copyright {
                font-size: 0.7rem;
                color: #444;
            }

            .qr-wrapper {
                background: #fff;
                padding: 10px;
                border-radius: 10px;
            }

            .qr-wrapper img {
                display: block;
                width: 100%;
                max-width: 180px;
                height: auto;
                margin: 0 auto;
            }

            @media (max-width: 600px) {
                body {
                    padding: 0 12px;
                }

                .payment-grid {
                    gap: 8px;
                }

                .payment-card {
                    padding: 8px;
                }

                .payment-title {
                    gap: 5px;
                    margin-bottom: 8px;
                }

                .sponsor-icon {
                    width: 22px;
                    height: 22px;
                    font-size: 0.75rem;
                }

                .sponsor-name {
                    font-size: 0.68rem;
                }

                .qr-wrapper {
                    padding: 6px;
                }
            }

            @media (max-height: 700px) {
                .header-section {
                    margin-bottom: 1.5vh;
                }
            }
        </style>
    </head>

    <body>
        <div class="header-section anim-fade-up delay-1">
            <div class="avatar-wrapper"><i class="fab fa-github-alt"></i></div>
            <h1>Sponsor wu-clan</h1>
            <p>Fueling innovation with every contribution.</p>
        </div>

        <div class="content-container anim-fade-up delay-2">
            <div class="section-label">Direct Support</div>

            <div class="payment-grid">
                <div class="payment-card alipay-card">
                    <div class="payment-title">
                        <div class="sponsor-icon">
                            <i class="fab fa-alipay"></i>
                        </div>
                        <span class="sponsor-name">AliPay</span>
                    </div>
                    <div class="qr-wrapper">
                        <img
                            src="https://wu-clan.github.io/picx-images-hosting/pay/zfb.jpg"
                            alt="AliPay QR code"
                        />
                    </div>
                </div>

                <div class="payment-card wechat-card">
                    <div class="payment-title">
                        <div class="sponsor-icon">
                            <i class="fab fa-weixin"></i>
                        </div>
                        <span class="sponsor-name">WeChat Pay</span>
                    </div>
                    <div class="qr-wrapper">
                        <img
                            src="https://wu-clan.github.io/picx-images-hosting/pay/weixin.jpg"
                            alt="WeChat Pay QR code"
                        />
                    </div>
                </div>

                <div class="payment-card wechat-card">
                    <div class="payment-title">
                        <div class="sponsor-icon">
                            <i class="fas fa-heart"></i>
                        </div>
                        <span class="sponsor-name">WeChat Reward</span>
                    </div>
                    <div class="qr-wrapper">
                        <img
                            src="https://wu-clan.github.io/picx-images-hosting/pay/weixin_zs.jpg"
                            alt="WeChat Reward QR code"
                        />
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-section anim-fade-up delay-2">
            <div class="copyright">
                &copy; 2026 wu-clan. Designed with passion.
            </div>
            <div class="social-links">
                <a
                    href="https://github.com/wu-clan"
                    target="_blank"
                    style="color: #444"
                    ><i class="fab fa-github"></i
                ></a>
            </div>
        </div>
    </body>
</html>
